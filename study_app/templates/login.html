{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | AI Study Helper</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <a href="{% url 'index' %}" class="brand">AI Study Helper</a>
        <form method="post" class="card auth-card">
            {% csrf_token %}
            <h1>Вход</h1>
            <p class="subtle">Продолжите обучение в личном кабинете.</p>
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}
            <label>Логин
                <input type="text" name="username" required>
            </label>
            <label>Пароль
                <input type="password" name="password" required>
            </label>
            <button type="submit" class="btn btn-primary">Войти</button>
            <p class="switch-link">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
        </form>
    </div>
</body>
</html>
